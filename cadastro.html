<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Finança</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-chart-line"></i>
                <span>Finança</span>
            </div>

            <input class="modal-input" type="text" id="inputNome" placeholder="Nome completo">
            <input class="modal-input" type="email" id="inputEmail" placeholder="E-mail">
            <input class="modal-input" type="password" id="inputSenha" placeholder="Senha (mínimo 8 caracteres)">

            <button class="modal-confirm" id="btnCadastrar">Criar conta</button>

            <p class="auth-link">Já tem conta? <a href="login.html">Entrar</a></p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/cadastro.js"></script>

</body>

</html>
